<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>🎰 随机抽取大师</title>
<style>
:root {
  --primary: #00d4ff;
  --primary-dark: #0072ff;
  --gold: #ffd700;
  --bg: #1a1a2e;
  --card: rgba(255,255,255,0.08);
  --card-border: rgba(255,255,255,0.1);
  --text: #fff;
  --text-dim: #aaa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  min-height: 100vh;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 0 16px 100px; }

/* Header */
.header {
  padding: 16px 0 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 20px; }
.header-actions { display: flex; gap: 12px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.icon-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  padding: 8px 0 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tab.active {
  background: rgba(0,200,255,0.15);
  color: var(--primary);
  border-color: rgba(0,200,255,0.3);
}

/* Wheel */
.wheel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.wheel-wrap {
  position: relative;
  width: 300px;
  height: 300px;
}
.wheel-pointer {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 26px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
canvas#wheel { width: 300px; height: 300px; }

/* Spin button */
.spin-btn {
  margin-top: 16px;
  padding: 14px 60px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 25px rgba(0,114,255,0.4);
  transition: all 0.2s;
}
.spin-btn:hover { transform: scale(1.05); box-shadow: 0 8px 35px rgba(0,114,255,0.5); }
.spin-btn:active { transform: scale(0.95); }
.spin-btn:disabled { opacity: 0.5; transform: none; }

/* Cards */
.card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--card-border);
}
.card-title {
  font-size: 14px;
  font-weight: bold;
  color: var(--primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title .badge {
  font-size: 11px;
  background: rgba(0,200,255,0.15);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: normal;
}

/* Input */
textarea, input[type="text"], input[type="number"] {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  font-family: inherit;
}
textarea:focus, input:focus { border-color: var(--primary); }
textarea { height: 120px; resize: vertical; }
textarea::placeholder, input::placeholder { color: #555; }

/* Settings row */
.setting {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.setting:last-child { border-bottom: none; }
.setting-label { font-size: 14px; color: var(--text-dim); }
.setting-value { display: flex; align-items: center; gap: 8px; }

/* Toggle */
.toggle {
  width: 44px; height: 24px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: 0.3s;
}
.toggle.on { background: var(--primary-dark); }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: 0.3s;
}
.toggle.on::after { left: 23px; }

/* Number input */
.num-input {
  width: 60px;
  text-align: center;
  padding: 6px;
  border-radius: 8px;
  font-size: 14px;
}

/* Preset chips */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.chip {
  padding: 6px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { background: rgba(0,200,255,0.12); color: var(--primary); border-color: rgba(0,200,255,0.3); }

/* Result */
.result-card {
  background: rgba(255,215,0,0.08);
  border: 2px solid rgba(255,215,0,0.2);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}
.result-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.result-text {
  font-size: 26px;
  font-weight: bold;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(255,215,0,0.4);
  word-break: break-all;
  line-height: 1.4;
}
.result-sub { font-size: 12px; color: #888; margin-top: 6px; }

/* History */
.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.history-item .name { color: var(--text-dim); }
.history-item .time { color: #555; font-size: 11px; }

/* Custom presets */
.preset-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  margin-bottom: 8px;
}
.preset-info { flex: 1; }
.preset-name { font-size: 14px; font-weight: bold; }
.preset-count { font-size: 11px; color: #888; margin-top: 2px; }
.preset-actions { display: flex; gap: 8px; }
.preset-action {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preset-action:hover { background: rgba(255,255,255,0.15); }
.preset-action.del:hover { background: rgba(231,76,60,0.3); color: #e74c3c; }

/* Buttons */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  flex: 1;
}
.btn-outline {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-dim);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #f39c12);
  color: #000;
}
.btn-row { display: flex; gap: 10px; margin-top: 12px; }

/* Modal */
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(5px);
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: #1e1e3a;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: popIn 0.3s ease;
}
@keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #888;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Result modal */
.result-modal { text-align: center; }
.result-modal .emoji { font-size: 50px; margin-bottom: 10px; }
.result-modal .big-result {
  font-size: 32px;
  font-weight: bold;
  color: var(--gold);
  margin-bottom: 16px;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  line-height: 1.4;
}

/* Page sections */
.page { display: none; }
.page.active { display: block; }

/* Empty state */
.empty {
  text-align: center;
  padding: 30px;
  color: #555;
  font-size: 13px;
}

/* Install banner */
.install-banner {
  display: none;
  background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,114,255,0.15));
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.install-banner .btn { padding: 6px 16px; font-size: 12px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Color picker */
.color-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.color-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.color-dot:hover, .color-dot.active {
  border-color: #fff;
  transform: scale(1.15);
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>🎰 随机抽取大师</h1>
    <div class="header-actions">
      <div class="icon-btn" onclick="showPage('settings')" title="设置">⚙️</div>
      <div class="icon-btn" onclick="showPage('presets')" title="预设">📋</div>
      <div class="icon-btn" onclick="showPage('home')" title="首页">🏠</div>
    </div>
  </div>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <!-- Tabs for quick presets -->
    <div class="tabs" id="presetTabs"></div>

    <!-- Wheel -->
    <div class="wheel-section">
      <div class="wheel-wrap">
        <div class="wheel-pointer">▼</div>
        <canvas id="wheel" width="600" height="600"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">🎯 开始抽取</button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard" style="display:none;">
      <div class="result-label">🎯 抽取结果</div>
      <div class="result-text" id="resultText"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <!-- Input -->
    <div class="card">
      <div class="card-title">
        📝 候选名单
        <span class="badge" id="itemCount">0项</span>
      </div>
      <textarea id="itemInput" placeholder="每行一个选项&#10;例如：张三、李四、王五" oninput="onInputChange()"></textarea>
      <div class="chips" id="quickPresets"></div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="card-title">
        📜 历史记录
        <span class="badge" id="historyCount">0条</span>
      </div>
      <div id="historyList"></div>
      <div class="empty" id="historyEmpty">暂无记录</div>
    </div>
  </div>

  <!-- PRESETS PAGE -->
  <div class="page" id="page-presets">
    <div class="card">
      <div class="card-title">📋 我的预设</div>
      <div id="customPresetsList"></div>
      <div class="empty" id="presetsEmpty">还没有自定义预设</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="showAddPreset()">➕ 新建预设</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📦 内置预设</div>
      <div id="builtInPresetsList"></div>
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">⚙️ 抽取设置</div>
      <div class="setting">
        <span class="setting-label">抽取人数</span>
        <div class="setting-value">
          <input type="number" class="num-input" id="pickCount" value="1" min="1" max="50" onchange="saveSettings()">
        </div>
      </div>
      <div class="setting">
        <span class="setting-label">已抽中不重复</span>
        <div class="setting-value">
          <div class="toggle on" id="toggleNoRepeat" onclick="toggleSwitch(this); saveSettings()"></div>
        </div>
      </div>
      <div class="setting">
        <span class="setting-label">音效</span>
        <div class="setting-value">
          <div class="toggle on" id="toggleSound" onclick="toggleSwitch(this); saveSettings()"></div>
        </div>
      </div>
      <div class="setting">
        <span class="setting-label">弹窗特效</span>
        <div class="setting-value">
          <div class="toggle on" id="toggleEffect" onclick="toggleSwitch(this); saveSettings()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎨 主题颜色</div>
      <div class="color-options" id="themeColors"></div>
    </div>

    <div class="card">
      <div class="card-title">💾 数据管理</div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="exportData()">📤 导出数据</button>
        <button class="btn btn-outline" onclick="importData()">📥 导入数据</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" style="border-color:rgba(231,76,60,0.3);color:#e74c3c;" onclick="clearHistory()">🗑️ 清空历史</button>
        <button class="btn btn-outline" style="border-color:rgba(231,76,60,0.3);color:#e74c3c;" onclick="resetAll()">⚠️ 重置全部</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ℹ️ 关于</div>
      <div style="font-size:13px;color:#888;line-height:1.8;">
        随机抽取大师 v1.0<br>
        支持转盘抽取、自定义预设、历史记录<br>
        数据保存在本地，隐私安全
      </div>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-bg" id="resultModal">
  <div class="modal result-modal">
    <div class="emoji">🎉</div>
    <div class="big-result" id="modalResultText"></div>
    <button class="btn btn-gold" onclick="closeModal()" style="width:100%;">知道了</button>
  </div>
</div>

<!-- Add Preset Modal -->
<div class="modal-bg" id="addPresetModal">
  <div class="modal">
    <div class="modal-title">
      新建预设
      <div class="modal-close" onclick="closePresetModal()">✕</div>
    </div>
    <input type="text" id="presetNameInput" placeholder="预设名称" style="margin-bottom:10px;">
    <textarea id="presetItemsInput" placeholder="每行一个选项" style="height:150px;"></textarea>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closePresetModal()">取消</button>
      <button class="btn btn-primary" onclick="savePreset()">保存</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-bg" id="importModal">
  <div class="modal">
    <div class="modal-title">
      导入数据
      <div class="modal-close" onclick="document.getElementById('importModal').classList.remove('show')">✕</div>
    </div>
    <textarea id="importDataInput" placeholder="粘贴导出的JSON数据" style="height:150px;"></textarea>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="document.getElementById('importModal').classList.remove('show')">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">

<script>
// ========== DATA ==========
const BUILT_IN_PRESETS = {
  team: { name: '👥 团队分工', items: ['张三','李四','王五','赵六','钱七','孙八','周九','吴十'] },
  food: { name: '🍜 今天吃啥', items: ['火锅','烧烤','麻辣烫','寿司','炸鸡','奶茶','螺蛳粉','黄焖鸡','拉面','饺子','汉堡','披萨','烤鱼','冒菜'] },
  truth: { name: '🎲 真心话大冒险', items: ['真心话','大冒险','喝一杯','学猫叫','唱首歌','讲笑话','做俯卧撑','原地转圈','模仿秀','跳个舞'] },
  yesno: { name: '✅ 是或否', items: ['是','否'] },
  number: { name: '🔢 数字1-100', items: Array.from({length:100},(_,i)=>String(i+1)) },
  weekend: { name: '🌈 周末去哪', items: ['看电影','逛商场','公园野餐','KTV','密室逃脱','剧本杀','爬山','打游戏','宅家','逛街','博物馆','咖啡厅'] },
  fruit: { name: '🍎 水果', items: ['苹果','香蕉','橘子','葡萄','西瓜','草莓','芒果','菠萝','猕猴桃','樱桃','桃子','梨'] },
  color: { name: '🎨 颜色', items: ['红色','蓝色','绿色','黄色','紫色','粉色','橙色','白色','黑色','青色'] }
};

const THEMES = [
  { name: '冰蓝', primary: '#00d4ff', dark: '#0072ff' },
  { name: '樱花', primary: '#ff6b9d', dark: '#c44569' },
  { name: '薄荷', primary: '#00b894', dark: '#00897b' },
  { name: '日落', primary: '#fdcb6e', dark: '#e17055' },
  { name: '薰衣草', primary: '#a29bfe', dark: '#6c5ce7' },
  { name: '珊瑚', primary: '#ff7675', dark: '#d63031' },
  { name: '星空', primary: '#74b9ff', dark: '#0984e3' },
  { name: '金色', primary: '#ffd700', dark: '#f39c12' }
];

let state = {
  items: [],
  customPresets: {},
  history: [],
  drawnItems: new Set(),
  settings: {
    pickCount: 1,
    noRepeat: true,
    sound: true,
    effect: true,
    theme: 0
  }
};

let currentAngle = 0;
let isSpinning = false;
let activePresetKey = null;

// Audio
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTick() {
  if (!state.settings.sound) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = 600 + Math.random() * 600;
  gain.gain.value = 0.04;
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  osc.start(); osc.stop(ctx.currentTime + 0.05);
}
function playWin() {
  if (!state.settings.sound) return;
  const ctx = getAudioCtx();
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = f;
      gain.gain.value = 0.06;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    }, i * 100);
  });
}

// ========== STORAGE ==========
function loadState() {
  try {
    const saved = localStorage.getItem('randomPickerState');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed, drawnItems: new Set(parsed.drawnItems || []) };
    }
  } catch(e) {}
}
function saveState() {
  try {
    const toSave = { ...state, drawnItems: [...state.drawnItems] };
    localStorage.setItem('randomPickerState', JSON.stringify(toSave));
  } catch(e) {}
}

// ========== WHEEL ==========
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F8C471','#82E0AA','#F1948A','#AED6F1','#D7BDE2','#A3E4D7'];

function drawWheel(angle = 0) {
  const cx = 300, cy = 300, r = 270;
  ctx.clearRect(0, 0, 600, 600);

  if (state.items.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555'; ctx.font = '20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('请先输入候选名单', cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / state.items.length;

  state.items.forEach((item, i) => {
    const sa = angle + i * slice;
    const ea = sa + slice;

    // Slice fill
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, sa, ea); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2; ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(sa + slice / 2);
    ctx.fillStyle = '#000';
    ctx.font = `bold ${Math.min(20, Math.max(10, Math.floor(180 / state.items.length)))}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const txt = item.length > 7 ? item.slice(0, 7) + '..' : item;
    ctx.fillText(txt, r * 0.58, 0);
    ctx.restore();
  });

  // Center
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,200,255,0.4)'; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GO', cx, cy);
}

// ========== CORE LOGIC ==========
function spin() {
  if (isSpinning || state.items.length < 2) {
    if (state.items.length < 2) alert('请至少输入2个选项！');
    return;
  }

  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Filter available
  let available = [...state.items];
  if (state.settings.noRepeat && state.drawnItems.size > 0) {
    available = available.filter(x => !state.drawnItems.has(x));
    if (available.length < state.settings.pickCount) {
      state.drawnItems.clear();
      available = [...state.items];
    }
  }

  // Pick winners
  const winners = [];
  const pool = [...available];
  for (let i = 0; i < Math.min(state.settings.pickCount, pool.length); i++) {
    const idx = Math.floor(Math.random() * pool.length);
    winners.push(pool[idx]);
    pool.splice(idx, 1);
  }

  // Calculate target angle
  const wIdx = state.items.indexOf(winners[0]);
  const slice = (Math.PI * 2) / state.items.length;
  const target = -(wIdx * slice + slice / 2) + Math.PI / 2;
  const extra = (5 + Math.random() * 3) * Math.PI * 2;
  const total = target + extra;
  const startAngle = currentAngle;
  const duration = 3500 + Math.random() * 1500;
  const startTime = performance.now();
  let lastTick = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 4);
    currentAngle = startAngle + total * eased;

    const norm = ((currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const tickIdx = Math.floor(norm / slice);
    if (tickIdx !== lastTick) { playTick(); lastTick = tickIdx; }

    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      currentAngle = currentAngle % (Math.PI * 2);
      onWin(winners);
    }
  }
  requestAnimationFrame(animate);
}

function onWin(winners) {
  playWin();
  winners.forEach(w => {
    state.drawnItems.add(w);
    state.history.unshift({ name: w, time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) });
  });
  saveState();

  // Show result
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultText').textContent = winners.join('、');
  document.getElementById('resultSub').textContent = `共 ${winners.length} 人 · 累计 ${state.history.length} 次`;

  // Modal
  if (state.settings.effect) {
    document.getElementById('modalResultText').textContent = winners.join('、');
    document.getElementById('resultModal').classList.add('show');
    createConfetti();
  }

  renderHistory();
}

function closeModal() { document.getElementById('resultModal').classList.remove('show'); }

function createConfetti() {
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}vw;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:200;pointer-events:none;animation:cf ${2+Math.random()*2}s ease-out forwards;`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
  if (!document.getElementById('cfStyle')) {
    const s = document.createElement('style'); s.id = 'cfStyle';
    s.textContent = `@keyframes cf{to{transform:translateY(100vh) rotate(${360+Math.random()*720}deg);opacity:0;}}`;
    document.head.appendChild(s);
  }
}

// ========== UI ==========
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function onInputChange() {
  const text = document.getElementById('itemInput').value.trim();
  state.items = text ? text.split('\n').map(s => s.trim()).filter(s => s) : [];
  document.getElementById('itemCount').textContent = state.items.length + '项';
  drawWheel(currentAngle);
  saveState();
}

function toggleSwitch(el) { el.classList.toggle('on'); }

function saveSettings() {
  state.settings.pickCount = parseInt(document.getElementById('pickCount').value) || 1;
  state.settings.noRepeat = document.getElementById('toggleNoRepeat').classList.contains('on');
  state.settings.sound = document.getElementById('toggleSound').classList.contains('on');
  state.settings.effect = document.getElementById('toggleEffect').classList.contains('on');
  saveState();
}

function loadSettingsUI() {
  document.getElementById('pickCount').value = state.settings.pickCount;
  if (state.settings.noRepeat) document.getElementById('toggleNoRepeat').classList.add('on');
  else document.getElementById('toggleNoRepeat').classList.remove('on');
  if (state.settings.sound) document.getElementById('toggleSound').classList.add('on');
  else document.getElementById('toggleSound').classList.remove('on');
  if (state.settings.effect) document.getElementById('toggleEffect').classList.add('on');
  else document.getElementById('toggleEffect').classList.remove('on');
}

// ========== PRESETS ==========
function renderPresetTabs() {
  const tabs = document.getElementById('presetTabs');
  let html = '';
  Object.entries(BUILT_IN_PRESETS).forEach(([k, v]) => {
    html += `<div class="tab${activePresetKey===k?' active':''}" onclick="loadPreset('${k}')">${v.name}</div>`;
  });
  Object.entries(state.customPresets).forEach(([k, v]) => {
    html += `<div class="tab${activePresetKey===k?' active':''}" onclick="loadCustomPreset('${k}')">${v.name}</div>`;
  });
  tabs.innerHTML = html;
}

function loadPreset(key) {
  activePresetKey = key;
  const preset = BUILT_IN_PRESETS[key];
  document.getElementById('itemInput').value = preset.items.join('\n');
  state.items = [...preset.items];
  document.getElementById('itemCount').textContent = state.items.length + '项';
  state.drawnItems.clear();
  drawWheel(0); currentAngle = 0;
  saveState();
  renderPresetTabs();
  renderHistory();
  showPage('home');
}

function loadCustomPreset(key) {
  activePresetKey = key;
  const preset = state.customPresets[key];
  document.getElementById('itemInput').value = preset.items.join('\n');
  state.items = [...preset.items];
  document.getElementById('itemCount').textContent = state.items.length + '项';
  state.drawnItems.clear();
  drawWheel(0); currentAngle = 0;
  saveState();
  renderPresetTabs();
  renderHistory();
  showPage('home');
}

function renderQuickPresets() {
  const el = document.getElementById('quickPresets');
  el.innerHTML = Object.entries(BUILT_IN_PRESETS).slice(0, 6).map(([k, v]) =>
    `<div class="chip" onclick="loadPreset('${k}')">${v.name}</div>`
  ).join('');
}

function renderBuiltInPresets() {
  const el = document.getElementById('builtInPresetsList');
  el.innerHTML = Object.entries(BUILT_IN_PRESETS).map(([k, v]) =>
    `<div class="preset-item"><div class="preset-info"><div class="preset-name">${v.name}</div><div class="preset-count">${v.items.length} 项</div></div><div class="preset-actions"><button class="preset-action" onclick="loadPreset('${k}')">▶</button></div></div>`
  ).join('');
}

function renderCustomPresets() {
  const el = document.getElementById('customPresetsList');
  const empty = document.getElementById('presetsEmpty');
  const keys = Object.keys(state.customPresets);
  if (keys.length === 0) { el.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  el.innerHTML = keys.map(k => {
    const p = state.customPresets[k];
    return `<div class="preset-item"><div class="preset-info"><div class="preset-name">${p.name}</div><div class="preset-count">${p.items.length} 项</div></div><div class="preset-actions"><button class="preset-action" onclick="loadCustomPreset('${k}')">▶</button><button class="preset-action del" onclick="deletePreset('${k}')">🗑</button></div></div>`;
  }).join('');
}

function showAddPreset() {
  document.getElementById('presetNameInput').value = '';
  document.getElementById('presetItemsInput').value = '';
  document.getElementById('addPresetModal').classList.add('show');
}
function closePresetModal() { document.getElementById('addPresetModal').classList.remove('show'); }

function savePreset() {
  const name = document.getElementById('presetNameInput').value.trim();
  const items = document.getElementById('presetItemsInput').value.split('\n').map(s => s.trim()).filter(s => s);
  if (!name) { alert('请输入预设名称'); return; }
  if (items.length < 2) { alert('请至少输入2个选项'); return; }
  const key = 'custom_' + Date.now();
  state.customPresets[key] = { name, items };
  saveState();
  closePresetModal();
  renderCustomPresets();
  renderPresetTabs();
}

function deletePreset(key) {
  if (!confirm('确定删除这个预设？')) return;
  delete state.customPresets[key];
  saveState();
  renderCustomPresets();
  renderPresetTabs();
}

// ========== HISTORY ==========
function renderHistory() {
  const el = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const count = document.getElementById('historyCount');
  count.textContent = state.history.length + '条';
  if (state.history.length === 0) { el.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  el.innerHTML = state.history.slice(0, 50).map(h =>
    `<div class="history-item"><span class="name">🎯 ${h.name}</span><span class="time">${h.time}</span></div>`
  ).join('');
}

// ========== SETTINGS ==========
function renderThemeColors() {
  const el = document.getElementById('themeColors');
  el.innerHTML = THEMES.map((t, i) =>
    `<div class="color-dot${state.settings.theme===i?' active':''}" style="background:${t.primary}" onclick="setTheme(${i})" title="${t.name}"></div>`
  ).join('');
}

function setTheme(idx) {
  state.settings.theme = idx;
  const t = THEMES[idx];
  document.documentElement.style.setProperty('--primary', t.primary);
  document.documentElement.style.setProperty('--primary-dark', t.dark);
  saveState();
  renderThemeColors();
  drawWheel(currentAngle);
}

function clearHistory() {
  if (!confirm('确定清空所有历史记录？')) return;
  state.history = [];
  state.drawnItems.clear();
  saveState();
  renderHistory();
  document.getElementById('resultCard').style.display = 'none';
}

function resetAll() {
  if (!confirm('确定重置全部数据？这将清除所有预设和历史记录！')) return;
  localStorage.removeItem('randomPickerState');
  location.reload();
}

function exportData() {
  const data = JSON.stringify({ ...state, drawnItems: [...state.drawnItems] }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '随机抽取大师_数据.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  document.getElementById('importModal').classList.add('show');
}
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      state = { ...state, ...parsed, drawnItems: new Set(parsed.drawnItems || []) };
      saveState();
      initUI();
      alert('导入成功！');
    } catch(e) { alert('导入失败：数据格式错误'); }
  };
  reader.readAsText(file);
}
function doImport() {
  try {
    const text = document.getElementById('importDataInput').value.trim();
    const parsed = JSON.parse(text);
    state = { ...state, ...parsed, drawnItems: new Set(parsed.drawnItems || []) };
    saveState();
    initUI();
    document.getElementById('importModal').classList.remove('show');
    alert('导入成功！');
  } catch(e) { alert('导入失败：JSON格式错误'); }
}

// ========== INIT ==========
function initUI() {
  document.getElementById('itemInput').value = state.items.join('\n');
  document.getElementById('itemCount').textContent = state.items.length + '项';
  loadSettingsUI();
  renderPresetTabs();
  renderQuickPresets();
  renderBuiltInPresets();
  renderCustomPresets();
  renderHistory();
  renderThemeColors();
  if (state.settings.theme > 0) setTheme(state.settings.theme);
  drawWheel(currentAngle);
}

loadState();
initUI();
</script>
